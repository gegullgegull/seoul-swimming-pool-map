<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Seoul Swim Map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Seoul Swim Map</p>
          <h1>서울 수영장 지도</h1>
          <p class="subtitle">지도 위 물개 핀을 탭하면 운영정보와 가격 메모를 바로 볼 수 있습니다.</p>
        </div>
        <button id="locateButton" class="icon-button" type="button" aria-label="현재 위치 기준으로 보기">
          <span aria-hidden="true">⌖</span>
        </button>
      </section>

      <section id="setupNotice" class="notice hidden">
        <strong>카카오맵 키가 필요합니다.</strong>
        <span>README.md 안내에 따라 <code>config.js</code>의 <code>KAKAO_JAVASCRIPT_KEY</code>를 입력하세요.</span>
      </section>

      <section class="toolbar" aria-label="수영장 필터">
        <div class="search-wrap">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="동네, 수영장, 가격 검색" autocomplete="off" />
        </div>
        <div class="chips" role="group" aria-label="유형 필터">
          <button class="chip active" type="button" data-filter="all">전체</button>
          <button class="chip" type="button" data-filter="public">공공</button>
          <button class="chip" type="button" data-filter="hangang">한강</button>
          <button class="chip" type="button" data-filter="indoor">실내</button>
        </div>
      </section>

      <section class="map-card" aria-label="서울 수영장 지도">
        <div id="map" class="map"></div>
        <div id="fallbackMap" class="fallback-map">
          <div class="seal-pin">🦭</div>
          <p>카카오맵 키를 넣으면 여기에 지도가 표시됩니다.</p>
        </div>
      </section>

      <section class="sheet" aria-label="수영장 목록">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">Pools</p>
            <h2>수영장 리스트</h2>
          </div>
          <span id="countBadge" class="count-badge">0곳</span>
        </div>
        <div id="poolList" class="pool-list"></div>
      </section>
    </main>

    <template id="poolCardTemplate">
      <article class="pool-card">
        <button class="pool-card-button" type="button">
          <div class="pool-main">
            <span class="pool-emoji" aria-hidden="true">🦭</span>
            <div>
              <h3></h3>
              <p class="pool-meta"></p>
            </div>
          </div>
          <div class="pool-details">
            <p class="hours"></p>
            <p class="price"></p>
            <p class="note"></p>
          </div>
        </button>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="pools.js"></script>
    <script src="app.js"></script>
  </body>
</html>
