<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Seoul Swim Map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Seoul Swim Map</p>
          <h1>서울 수영장 지도</h1>
          <p class="subtitle">공공, 한강, 민간 수영장을 지도와 목록에서 같이 봅니다.</p>
        </div>
        <button id="locateButton" class="icon-button" type="button" aria-label="현재 위치 사용">
          <span aria-hidden="true">•</span>
        </button>
      </section>

      <section id="setupNotice" class="notice hidden">
        <strong>Kakao Maps setup is required</strong>
        <span>README.md 안내대로 <code>config.js</code>에 <code>KAKAO_JAVASCRIPT_KEY</code>를 넣으세요.</span>
      </section>

      <section class="toolbar" aria-label="수영장 필터">
        <div class="search-wrap">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="수영장, 구, 주소로 검색" autocomplete="off" />
        </div>
        <div class="chips" role="group" aria-label="유형 필터">
          <button class="chip active" type="button" data-filter="all">전체</button>
          <button class="chip" type="button" data-filter="public">공공</button>
          <button class="chip" type="button" data-filter="hangang">한강</button>
          <button class="chip" type="button" data-filter="private">민간</button>
        </div>
      </section>

      <section class="map-card" aria-label="서울 수영장 지도">
        <div id="map" class="map"></div>
        <div id="fallbackMap" class="fallback-map hidden">
          <div class="seal-pin">•</div>
          <p>Kakao Maps 설정이 없으면 목록만 보입니다.</p>
        </div>
      </section>

      <section class="sheet" aria-label="수영장 목록">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">Pools</p>
            <h2>수영장 리스트</h2>
          </div>
          <span id="countBadge" class="count-badge">0개</span>
        </div>
        <div id="poolList" class="pool-list"></div>
      </section>
    </main>

    <template id="poolCardTemplate">
      <article class="pool-card">
        <button class="pool-card-button" type="button">
          <div class="pool-main">
            <span class="pool-emoji" aria-hidden="true">•</span>
            <div>
              <h3></h3>
              <p class="pool-meta"></p>
            </div>
          </div>
          <div class="pool-details"></div>
        </button>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="pools.js"></script>
    <script src="app.js"></script>
  </body>
</html>
